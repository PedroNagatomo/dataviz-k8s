name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository }}-backend
  FRONTEND_IMAGE: ${{ github.repository }}-frontend

jobs:
  # JOB 1: Testes e Lint
  test:
    name: н·Ә Test & Lint
    runs-on: ubuntu-latest
    
    steps:
    - name: ніҘ Checkout cГіdigo
      uses: actions/checkout@v4
    
    - name: нҝў Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: |
          backend/package-lock.json
          frontend/package-lock.json
    
    - name: ніҰ Instalar dependГӘncias (Backend)
      working-directory: ./backend
      run: npm ci || npm install
    
    - name: ніҰ Instalar dependГӘncias (Frontend)
      working-directory: ./frontend
      run: npm ci || npm install
    
    - name: нҙҚ Lint Backend
      working-directory: ./backend
      run: |
        # Se nГЈo tiver script de lint, apenas verifica sintaxe
        npm run lint 2>/dev/null || echo "No lint script, checking syntax..."
        node -c server.js
    
    - name: нҙҚ Lint Frontend
      working-directory: ./frontend
      run: |
        npm run lint 2>/dev/null || echo "No lint script, skipping..."
    
    - name: н·Ә Testes Backend
      working-directory: ./backend
      run: |
        npm test 2>/dev/null || echo "No tests configured yet"
    
    - name: н·Ә Testes Frontend
      working-directory: ./frontend
      run: |
        npm test 2>/dev/null || echo "No tests configured yet"

  # JOB 2: Build e Push das Imagens Docker
  build:
    name: н°і Build & Push Images
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: ніҘ Checkout cГіdigo
      uses: actions/checkout@v4
    
    - name: нҙҗ Login no GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: нҝ—пёҸ Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: ніҠ Gerar metadados para Backend
      id: meta-backend
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
        tags: |
          type=sha,format=short
          type=ref,event=branch
          latest
    
    - name: ніҠ Gerar metadados para Frontend
      id: meta-frontend
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
        tags: |
          type=sha,format=short
          type=ref,event=branch
          latest
    
    - name: нҝ—пёҸ Build e Push Backend
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: ${{ steps.meta-backend.outputs.tags }}
        labels: ${{ steps.meta-backend.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: нҝ—пёҸ Build e Push Frontend
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: ${{ steps.meta-frontend.outputs.tags }}
        labels: ${{ steps.meta-frontend.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # JOB 3: Deploy no Kubernetes
  deploy:
    name: нәҖ Deploy to Kubernetes
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: ніҘ Checkout cГіdigo
      uses: actions/checkout@v4
    
    - name: вҳёпёҸ Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'
    
    - name: нҙҗ Configurar kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > $HOME/.kube/config
        chmod 600 $HOME/.kube/config
    
    - name: вң… Verificar conexГЈo com cluster
      run: |
        kubectl cluster-info
        kubectl get nodes
    
    - name: ніҰ Atualizar imagens no deployment
      run: |
        # Atualizar backend
        kubectl set image deployment/backend \
          backend=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:sha-${{ github.sha }} \
          -n dataviz --record
        
        # Atualizar frontend
        kubectl set image deployment/frontend \
          frontend=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:sha-${{ github.sha }} \
          -n dataviz --record
    
    - name: вҸі Aguardar rollout
      run: |
        kubectl rollout status deployment/backend -n dataviz --timeout=5m
        kubectl rollout status deployment/frontend -n dataviz --timeout=5m
    
    - name: нҙҚ Verificar saГәde dos pods
      run: |
        kubectl get pods -n dataviz
        kubectl get services -n dataviz
    
    - name: ніҠ Notificar sucesso
      if: success()
      run: |
        echo "вң… Deploy realizado com sucesso!"
        echo "нјҗ Frontend: http://localhost:30080"
        echo "нҙ§ Backend: http://localhost:30081"
    
    - name: нәЁ Rollback em caso de falha
      if: failure()
      run: |
        echo "вқҢ Deploy falhou! Iniciando rollback..."
        kubectl rollout undo deployment/backend -n dataviz
        kubectl rollout undo deployment/frontend -n dataviz
