name: PR Checks

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  security-scan:
    name: нґ’ Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: нґЌ Scan de dependГЄncias (Backend)
      uses: snyk/actions/node@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high
      continue-on-error: true
    
    - name: нґЌ Scan de dependГЄncias (Frontend)
      uses: snyk/actions/node@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high --file=frontend/package.json
      continue-on-error: true
  
  size-check:
    name: ніЏ Bundle Size Check
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Build Frontend
      working-directory: ./frontend
      run: |
        npm install
        npm run build
    
    - name: ніЉ Analisar tamanho do bundle
      working-directory: ./frontend
      run: |
        echo "ні¦ Tamanho do Bundle:"
        du -sh dist/
        echo ""
        echo "ніЃ Maiores arquivos:"
        find dist -type f -exec du -h {} + | sort -rh | head -10
